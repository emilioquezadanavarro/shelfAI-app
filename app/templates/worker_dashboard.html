<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShelfAI | User Dashboard</title>
    
    <!-- Google Fonts: Modern typography matching our brand guidelines -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- External modular CSS providing the glassmorphism container styles -->
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>

    <!-- Container override class 'dashboard-container' allows for page-specific width adjustments -->
    <div class="container dashboard-container">
        
        <div class="header-section">
            <!-- 
            Dynamic User Greeting:
            FastAPI successfully queried Supabase for this specific worker and passed the data
            inside the 'profile' context variable. Jinja2 injects it right here natively!
            -->
            <p class="welcome-header">Welcome Back</p>
            <h1>{{ profile.first_name }}</h1>
            <p>Upload a shelf photo to begin the AI audit.</p>
        </div>

        <!-- 
        The Image Upload Form:
        This form will eventually point to the Langchain AI Endpoint.
        CRITICAL: `enctype="multipart/form-data"` is absolutely required for any form
        that handles file uploads. Without it, the browser will not send the image binary.
        -->
        <form action="/api/analyze-shelf" method="POST" enctype="multipart/form-data">
            
            <!-- 
            Session Tracking (Hidden Input):
            We must explicitly pass the worker's ID to the AI endpoint. 
            By placing it in a hidden input, it is automatically bundled securely with the photo,
            ensuring the final audit results are forever linked to this exact employee.
            -->
            <input type="hidden" name="profile_id" value="{{ profile.id }}">

            <!-- Campaign Selector -->
            <div class="input-group" style="margin-bottom: 2rem;">
                <label for="campaign_id">Select Campaign to Audit</label>
                <select id="campaign_id" name="campaign_id" required>
                    <option value="" disabled selected>Choose a campaign...</option>
                    {% for campaign in campaigns %}
                    <option value="{{ campaign.id }}">{{ campaign.campaign_name }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Drag & Drop Upload Zone styled with custom CSS -->
            <div class="upload-area">
                <div class="upload-icon">📸</div>
                <div class="upload-text">Tap to take a photo</div>
                <div class="upload-subtext">or drag and drop an image here</div>
                
                <!-- 
                File Input Constraint:
                `accept="image/*"` restricts the upload widget to pictures. On mobile devices, 
                this triggers the OS to open the camera directly.
                -->
                <input type="file" name="shelf_photo" accept="image/*" required>
            </div>
            
            <button type="submit">Run AI Audit</button>
        </form>
    </div>

    <!-- Loading Spinner Overlay (hidden by default, shown on form submit) -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <p class="loading-text">Analyzing your shelf...</p>
    </div>

    <script>
        // 1. Grab the file input and the text we want to change
        const fileInput = document.querySelector('input[type="file"]');
        const uploadText = document.querySelector('.upload-text');
        
        // 2. Listen for whenever a file is uploaded or dropped
        fileInput.addEventListener('change', function(event) {
            // If the user actually selected a file...
            if (event.target.files.length > 0) {
                // Grab the name of the file
                const fileName = event.target.files[0].name;
                
                // Replace "Tap to take a photo" with a nice success message!
                uploadText.textContent = "✅ " + fileName;
                uploadText.style.color = "#4ade80"; // Turn the text a nice green color
            }
        });

        // 3. Show loading spinner when the form is submitted
        const form = document.querySelector('form');
        form.addEventListener('submit', function() {
            document.getElementById('loadingOverlay').classList.add('active');
        });
    </script>
</body>
</html>
